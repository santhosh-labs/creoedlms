<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/CREO.ED (7).png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creoed LMS</title>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('creoed-theme') || 'dark';
          if (theme === 'system') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', theme);
          
          var accent = localStorage.getItem('creoed-accent') || 'green';
          var accents = { green: '#1aae64', blue: '#1976d2', purple: '#7c3aed', orange: '#ea580c', teal: '#0d9488' };
          if (accents[accent]) {
            document.documentElement.style.setProperty('--primary', accents[accent]);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
